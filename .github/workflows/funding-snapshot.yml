name: Funding Rate Snapshot

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger funding snapshot
        run: |
          curl -X POST "${{ secrets.SNAPSHOT_URL }}/api/snapshot" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail \
            --silent \
            --show-error \
            -L
